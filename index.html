<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QikPic — Avatar Maker</title>
<meta name="description" content="Make your own QikPic avatar — mix and match skin, eyes, hair, beards, glasses and more, then download it!">
<link rel="icon" type="image/png" href="public/favicon.png">
<meta property="og:type" content="website">
<meta property="og:title" content="QikPic — Avatar Maker">
<meta property="og:description" content="Make your own QikPic avatar — mix and match skin, eyes, hair, beards, glasses and more.">
<meta property="og:url" content="https://drewnotweird.co.uk/qikpic/">
<meta property="og:image" content="https://drewnotweird.co.uk/qikpic/public/og-qikpic.jpg">
<meta property="og:image:width" content="1280">
<meta property="og:image:height" content="720">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="QikPic — Avatar Maker">
<meta name="twitter:description" content="Make your own QikPic avatar — mix and match skin, eyes, hair, beards, glasses and more.">
<meta name="twitter:image" content="https://drewnotweird.co.uk/qikpic/public/og-qikpic.jpg">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="qp-app">
  <header class="qp-top">
    <div class="qp-top__actions qp-top__actions--left">
      <button class="qp-top__btn" id="btnPng" title="Download PNG" aria-label="Download PNG">
        <img class="qp-top__btn-icon" src="icons/btn-download.svg" alt="">
      </button>
      <button class="qp-top__btn" id="btnShare" title="Share" aria-label="Share">
        <img class="qp-top__btn-icon" src="icons/btn-share.svg" alt="">
      </button>
    </div>
    <img class="qp-top__logo qp-top__logo--wide" src="icons/logo.svg" alt="QikPic">
    <img class="qp-top__logo qp-top__logo--stacked" src="icons/logo-stacked.svg" alt="QikPic">
    <div class="qp-top__actions qp-top__actions--right">
      <button class="qp-top__btn" id="btnRandom" title="Randomise" aria-label="Randomise">
        <img class="qp-top__btn-icon" src="icons/btn-random.svg" alt="">
      </button>
      <button class="qp-top__btn" id="btnAbout" title="About" aria-label="About">
        <img class="qp-top__btn-icon" src="icons/btn-about.svg" alt="">
      </button>
    </div>
  </header>

  <div class="qp-about" id="aboutOverlay" hidden>
    <div class="qp-about__panel">
      <img class="qp-about__logo" src="icons/logo.svg" alt="QikPic">
      <p class="qp-about__text">
        Web remake of the QikPic avatar maker, originally an AIR app for
        iOS and Android. A collaborative self-initiated project built out of love between
        <a href="https://www.instagram.com/hexiebob/" target="_blank" rel="noopener">Heather Miller</a>,
        <a href="https://www.linkedin.com/in/grant-kerr-767a08227/" target="_blank" rel="noopener">Grant Kerr</a> and
        <a href="https://drewnotweird.co.uk/work/qikpic/" target="_blank" rel="noopener">Andrew Nicolson</a>.
      </p>
      <button class="qp-about__close" id="btnAboutClose">Close</button>
    </div>
  </div>

  <main class="qp-body">
    <nav class="qp-rail" id="gridLeft"></nav>
    <section class="qp-stage">
      <svg class="qp-stage__svg" id="avatar" viewBox="0 0 640 640" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <mask id="hairMask" maskUnits="userSpaceOnUse" x="0" y="0" width="640" height="640">
            <rect x="0" y="0" width="640" height="640" fill="#000"/>
            <g id="hairMaskArt"></g>
          </mask>
          <mask id="beardMask" maskUnits="userSpaceOnUse" x="0" y="0" width="640" height="640">
            <rect x="0" y="0" width="640" height="640" fill="#000"/>
            <g id="beardMaskArt"></g>
          </mask>
          <clipPath id="stageClip"><rect x="0" y="0" width="640" height="640"/></clipPath>
        </defs>
        <g clip-path="url(#stageClip)">
          <g id="L_skin"></g>
          <g id="L_natural"></g>
          <g id="L_mouth"></g>
          <g id="L_eyes"></g>
          <g id="L_nose"></g>
          <g id="L_haircolour" mask="url(#hairMask)"></g>
          <g id="L_beardcolour" mask="url(#beardMask)"></g>
          <g id="L_accessories"></g>
          <g id="L_glasses"></g>
        </g>
      </svg>
    </section>
    <nav class="qp-rail" id="gridRight"></nav>
  </main>
</div>
<script src="assets.js"></script>
<script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>QikPic via Ruffle</title>
<style>body{margin:0;background:#333}#player{width:640px;height:1136px}</style>
</head>
<body>
<div id="player"></div>
<script src="ruffle-web/ruffle.js"></script>
<script>
window.RufflePlayer = window.RufflePlayer || {};
window.addEventListener("load", () => {
  const ruffle = window.RufflePlayer.newest();
  const player = ruffle.createPlayer();
  player.style.width = "640px";
  player.style.height = "1136px";
  document.getElementById("player").appendChild(player);
  player.ruffle().load({url: "QikPic.swf", autoplay: "on", unmuteOverlay: "hidden", scaleMode: "showAll"});
});
</script>
</body>
</html>
